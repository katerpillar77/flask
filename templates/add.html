{% extends "layout.html" %}

{% block title %}
    Add
{% endblock %}

{% block main %}
<h1>Add a paint colour</h1>
    <form action="/add" method="post">
        <div class="mb-3">
            <input autocomplete="off"  autofocus class="form-control mx-auto w-auto" name="name" placeholder="Paint colour" type="text">
        </div>
        <div class="mb-3">
            <input autocomplete="off" class="form-control mx-auto w-auto" name="hex" placeholder="Hexcode" type="text">
        </div>
        <div class="container">
            <div class="row">
              <div class="col col-">
                <input autocomplete="off"  class="form-control mx-auto " name="R" placeholder="Red" type="integer" min="1" max="255" step="1">
              </div>
              <div class="col col-">
                  <input autocomplete="off"  class="form-control mx-auto " name="G" placeholder="Green" type="integer" min="1" max="255" step="1">
              </div>
              <div class="col col-">
                  <input autocomplete="off"  class="form-control mx-auto " name="B" placeholder="Blue" type="integer" min="1" max="255" step="1">
              </div>
            </div>
        </div>
        <button class="btn btn-primary" type="submit">Add</button>
    </form>
{% endblock %}
